workflow_id: email_validation_workflow
name: Email Validation Workflow
description: |
  This workflow takes a list of email addresses, validates the format of each
  email using a regular expression, and returns a dictionary containing two
  lists: one for valid emails and one for invalid emails.

# Input variables for the workflow
variables:
  - name: email_addresses
    type: list
    description: A list of email address strings to be validated.
    default_value: []
    required: true

# Activities that make up the workflow
activities:
  - name: validate_email_formats
    description: >
      Iterates through a list of email addresses, validating each against a
      standard email format regex. It then separates the emails into two lists
      based on the validation outcome.
    inputs:
      - name: emails
        type: list
        description: The list of email address strings to process.
    output:
      type: dict
      description: >
        A dictionary with two keys: 'valid' and 'invalid'.
        'valid' contains a list of emails that passed format validation.
        'invalid' contains a list of emails that failed format validation.
    result_variable: validation_results

# How activities are executed
execution_pattern: sequence
