workflow_id: gcd_function_selector
name: GCD Function Parameter Extractor
description: |
  Extracts two numbers from a user prompt and returns the appropriate function call structure for calculating the greatest common divisor (GCD) using the math.gcd function.

variables:
  prompt: null

root:
  sequence:
    elements:
      - activity:
          name: extract_gcd_parameters
          params:
            prompt: ${{ prompt }}
          result: gcd_function_call