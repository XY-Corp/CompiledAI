workflow_id: dna_sequence_retrieval
name: DNA Sequence Request Parser
description: Parses user requests for DNA sequence retrieval and extracts the function parameters needed to call the fetch_DNA_sequence function
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_dna_request
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: dna_parameters