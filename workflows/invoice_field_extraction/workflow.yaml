workflow_id: invoice_field_extraction
name: Invoice Field Extraction
description: |
  Extract structured invoice fields from document text using LLM-based extraction.
  Parses vendor information, customer details, invoice metadata, and financial amounts
  from billing memorandum documents.
variables:
  prompt: null
  task_type: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_fields
          params:
            document_text: ${{ prompt }}
          result: extracted_fields