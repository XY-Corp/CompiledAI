workflow_id: velocity_calculator_function_mapper
name: Velocity Calculator Function Mapper
description: Parse natural language physics problem and map it to calculate_velocity function with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_physics_parameters
          params:
            problem_text: ${{ prompt }}
            function_schema: ${{ functions }}
          result: physics_mapping