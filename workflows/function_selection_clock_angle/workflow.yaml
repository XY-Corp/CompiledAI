workflow_id: function_selection_clock_angle
name: Clock Angle Function Selection
description: Analyzes a clock time question and returns the specific function call needed to calculate the angle between clock hands
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_time_and_select_function
          params:
            question: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call