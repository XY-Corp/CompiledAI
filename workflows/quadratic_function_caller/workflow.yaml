workflow_id: quadratic_function_caller
name: Quadratic Function Call Generator
description: Extracts quadratic equation coefficients from natural language and generates function call JSON for solving the equation
variables:
  prompt: null
  user_query: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_quadratic_coefficients
          params:
            text: ${{ user_query }}
          result: coefficients_result
      - activity:
          name: generate_function_call
          params:
            coefficients_data: ${{ coefficients_result }}
          result: function_call_result