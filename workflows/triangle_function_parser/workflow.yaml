workflow_id: triangle_function_parser
name: Triangle Function Parameter Parser
description: Parses natural language query to extract function parameters for triangle area calculation and formats them according to the expected output structure

variables:
  prompt: null
  user_query: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_triangle_parameters
          params:
            text: ${{ user_query }}
            available_functions: ${{ functions }}
          result: parsed_parameters