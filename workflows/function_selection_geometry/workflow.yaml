workflow_id: function_selection_geometry
name: Function Selection for Geometry Query
description: Analyzes user's geometry query and extracts parameters to format as function call for circumference calculation

variables:
  prompt: None
  functions: None

root:
  sequence:
    elements:
      - activity:
          name: extract_geometry_parameters
          params:
            user_query: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call