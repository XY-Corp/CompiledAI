workflow_id: triangle_area_calculator
name: Triangle Area Calculator
description: Parses natural language triangle calculation requests and extracts base and height parameters to call the calc_area_triangle function
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_triangle_parameters
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: extracted_params