workflow_id: clock_angle_function_selection
name: Clock Angle Function Selection
description: Analyzes a clock time question and returns the appropriate function call to calculate the angle between clock hands
variables:
  prompt: None
  functions: None
root:
  sequence:
    elements:
      - activity:
          name: analyze_clock_query
          params:
            user_query: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call