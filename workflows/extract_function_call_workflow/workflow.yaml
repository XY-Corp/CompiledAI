workflow_id: extract_function_call_workflow
name: Extract Function Call from Natural Language
description: Parses natural language prompts to extract function names and parameters, returning a structured function call object with the function name as the top-level key
variables:
  prompt: None
  functions: None
root:
  activity:
    name: extract_function_call
    params:
      user_prompt: ${{ prompt }}
      available_functions: ${{ functions }}