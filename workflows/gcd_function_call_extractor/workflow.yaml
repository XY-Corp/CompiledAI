workflow_id: gcd_function_call_extractor
name: GCD Function Call Extractor
description: |
  Extracts two numbers from a natural language prompt and returns a structured function call for math.gcd with the appropriate parameters.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_gcd_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: gcd_function_call