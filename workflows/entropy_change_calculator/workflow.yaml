workflow_id: entropy_change_calculator
name: Entropy Change Calculator
description: Extracts numerical parameters from a text prompt and formats them as a function call to calculate_entropy_change

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_entropy_parameters
          params:
            prompt_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: entropy_result