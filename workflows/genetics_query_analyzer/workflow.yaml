workflow_id: genetics_query_analyzer
name: Genetics Query Function Mapper
description: Analyzes user queries about genetic similarity and maps them to appropriate genetics.calculate_similarity function calls with extracted parameters
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_genetics_query
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call