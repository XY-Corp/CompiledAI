workflow_id: quadratic_solver_function_call
name: Quadratic Equation Function Call Generator
description: Analyzes a natural language query about solving quadratic equations, extracts coefficients and requirements, then generates the appropriate function call structure for the solve_quadratic function

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_quadratic_parameters
          params:
            prompt_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call