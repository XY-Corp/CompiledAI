workflow_id: extract_function_call_params
name: Extract Function Call Parameters
description: |
  Parses a natural language prompt to extract parameter values for a specified function call format. Given a prompt describing a task (like solving a quadratic equation) and available function definitions, this workflow extracts the actual parameter values and returns them in the exact function call structure required.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result