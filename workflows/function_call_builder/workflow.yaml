workflow_id: function_call_builder
name: Function Call Parameter Extraction Workflow
description: |
  Analyzes a natural language user prompt and available function definitions to select the appropriate function and extract the required parameters to build a function call object.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result
