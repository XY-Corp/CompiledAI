workflow_id: factorial_function_call_generator
name: Factorial Function Call Generator
description: Analyzes a user query about calculating factorials and generates the appropriate function call JSON structure for the math.factorial function with extracted parameters

variables:
  prompt: null
  user_query: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: generate_factorial_function_call
          params:
            query_text: ${{ user_query }}
            available_functions: ${{ functions }}
          result: function_call_result