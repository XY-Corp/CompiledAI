workflow_id: heat_capacity_function_extractor
name: Heat Capacity Function Call Extractor
description: Extracts temperature and volume parameters from user prompt and maps them to the calc_heat_capacity function call structure

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_heat_capacity_parameters
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: heat_capacity_call