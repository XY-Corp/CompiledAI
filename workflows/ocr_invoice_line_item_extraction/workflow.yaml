workflow_id: ocr_invoice_line_item_extraction
name: OCR Invoice Line Item Extraction
description: |
  Extracts line items from noisy OCR-scanned invoice documents using LLM-based 
  semantic understanding. Handles scanning artifacts, typos, and inconsistent 
  formatting to produce structured JSON array of line items.
variables:
  prompt: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_line_items
          params:
            ocr_text: ${{ prompt }}
          result: line_items