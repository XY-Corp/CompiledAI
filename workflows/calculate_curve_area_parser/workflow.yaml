workflow_id: calculate_curve_area_parser
name: Mathematical Function Area Calculator Parser
description: Parse natural language mathematical requests to extract function parameters for area under curve calculations

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_mathematical_request
          params:
            request_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: parsed_function