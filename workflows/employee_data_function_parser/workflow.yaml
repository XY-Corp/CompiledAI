workflow_id: employee_data_function_parser
name: Employee Data Function Parameter Parser
description: Parses user requests to extract function parameters for employee data fetching operations

variables:
  prompt: None
  functions: None

root:
  sequence:
    elements:
      - activity:
          name: parse_employee_request
          params:
            user_request: ${{ prompt }}
            function_schema: ${{ functions }}
          result: parsed_function_call