workflow_id: json_transformation_workflow
name: JSON Transformation Workflow
description: Transforms JSON data from source format to target format by parsing the transformation requirements from the prompt and performing field mapping and value transformation

variables:
  prompt: null
  _task_schema: null
  source_json: null
  target_schema: null

root:
  activity:
    name: transform_json_structure
    params:
      prompt_text: ${{ prompt }}
      source_data: ${{ source_json }}
      target_format: ${{ target_schema }}
    result: transformed_json