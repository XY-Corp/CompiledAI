workflow_id: quadratic_function_call_selector
name: Quadratic Function Call Selector
description: |
  Analyzes a natural language prompt about quadratic equations and returns the appropriate function call with extracted parameters. The workflow parses the user request to identify the function to call (algebra.quadratic_roots) and extracts the coefficients a, b, and c from the prompt.

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result