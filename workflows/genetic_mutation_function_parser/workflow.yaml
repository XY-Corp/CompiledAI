workflow_id: genetic_mutation_function_parser
name: Genetic Mutation Function Call Parser
description: Parses user request for genetic mutation analysis and returns the appropriate function call with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_genetic_mutation_request
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: parsed_function_call