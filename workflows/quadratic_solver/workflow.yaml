workflow_id: quadratic_solver
name: Quadratic Equation Solver
description: Parse user query to extract quadratic equation coefficients and return the appropriate function call with parameters
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_quadratic_query
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: result