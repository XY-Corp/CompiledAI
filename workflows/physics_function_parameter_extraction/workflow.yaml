workflow_id: physics_function_parameter_extraction
name: Physics Function Parameter Extraction
description: Analyzes physics problem text to extract parameters for electric field calculation function calls
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_physics_parameters
          params:
            problem_text: ${{ prompt }}
            function_schema: ${{ functions }}
          result: extracted_parameters