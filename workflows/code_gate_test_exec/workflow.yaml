workflow_id: code_gate_test_exec
name: Dynamic Code Executor (Vulnerable)
description: Executes user-provided Python code - CONTAINS INTENTIONAL VULNERABILITY

variables:
  code_string: null
  script: null
  variables: {}

activities:
