workflow_id: extract_invoice_line_items
name: Extract Invoice Line Items from OCR Text
description: |
  Extracts structured line items from noisy OCR-scanned invoice documents using LLM-based semantic understanding.
  Handles scanning artifacts, typos, and inconsistent formatting to identify item descriptions, quantities, unit prices, and total prices.
variables:
  prompt: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_line_items
          params:
            ocr_text: ${{ prompt }}
          result: line_items