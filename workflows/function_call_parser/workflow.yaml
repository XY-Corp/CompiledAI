workflow_id: function_call_parser
name: Function Call Parser Workflow
description: Extracts function call details from natural language queries and returns them in the expected function call format
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_function_call
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: parsed_function