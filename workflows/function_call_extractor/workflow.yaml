workflow_id: function_call_extractor
name: Function Call Extractor
description: |
  Analyzes a natural language prompt and available function definitions to determine which function to call and extracts the appropriate parameters from the prompt. Returns the function name as the top-level key with parameters nested inside.

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result
