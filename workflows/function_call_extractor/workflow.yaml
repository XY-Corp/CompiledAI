workflow_id: function_call_extractor
name: Function Call Parameter Extractor
description: |
  Extracts function name and parameters from natural language user queries by analyzing the prompt against available function definitions and returning a structured function call object.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result
