workflow_id: bmi_parameter_extractor
name: BMI Parameter Extractor
description: Extracts weight and height parameters from user prompts and formats them for BMI calculation function calls
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_bmi_parameters
          params:
            user_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: bmi_parameters