workflow_id: bmi_calculation_workflow
name: BMI Calculation Function Call Workflow
description: Parses user request text to extract weight and height values, then formats them as a function call structure for the calculate_bmi function

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_bmi_request
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: bmi_function_call