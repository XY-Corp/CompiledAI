workflow_id: temperature_mixing_parameter_extraction
name: Temperature Mixing Parameter Extraction
description: Extracts numerical parameters from a temperature mixing calculation prompt and formats them as function call parameters for the calculate_final_temperature function
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_temperature_mixing_parameters
          params:
            prompt_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: extracted_parameters