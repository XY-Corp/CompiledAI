workflow_id: triangle_function_selector
name: Triangle Function Selector
description: Analyzes a user request about triangle calculations and returns the appropriate function call with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_triangle_request
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call