workflow_id: support_ticket_categorization
name: Support Ticket Categorization
description: Classify a support ticket into one of four predefined categories and return only the category name as a string.
variables:
  ticket_text: null
  categories: ['billing', 'technical', 'account', 'general']
root:
  sequence:
    elements:
      - activity:
          name: classify_support_ticket
          params:
            ticket_text: ${{ ticket_text }}
            categories: ${{ categories }}
          result: category_result