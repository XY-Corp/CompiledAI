workflow_id: invoice_data_extraction
name: Invoice Data Extraction Workflow
description: |
  Extracts structured invoice data from document text including vendor info, 
  customer info, invoice details, and amounts using LLM parsing.
variables:
  prompt: null
  task_type: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_fields
          params:
            document_text: ${{ prompt }}
          result: invoice_data