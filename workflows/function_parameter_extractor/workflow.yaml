workflow_id: function_parameter_extractor
name: Function Parameter Extractor
description: Analyzes natural language queries to extract function names and parameters for API calls
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_function_request
          params:
            user_query: ${{ prompt }}
            available_functions: ${{ functions }}
          result: extracted_function