workflow_id: cell_density_parameter_extraction
name: Cell Density Parameter Extraction
description: Extracts parameters from natural language text and formats them for the calculate_cell_density function call
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_density_parameters
          params:
            prompt_text: ${{ prompt }}
            function_schema: ${{ functions }}
          result: density_parameters