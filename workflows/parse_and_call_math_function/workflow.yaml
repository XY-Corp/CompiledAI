workflow_id: parse_and_call_math_function
name: Parse Math Request and Generate Function Call
description: Analyzes a natural language math request to extract numbers and generate the appropriate function call structure for math.gcd with the extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_math_parameters
          params:
            request_text: ${{ prompt }}
          result: extracted_numbers
      - activity:
          name: generate_function_call
          params:
            function_name: "math.gcd"
            parameters: ${{ extracted_numbers }}
          result: function_call