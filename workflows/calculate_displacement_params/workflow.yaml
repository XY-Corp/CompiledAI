workflow_id: calculate_displacement_params
name: Calculate Displacement Parameters Extractor
description: Extracts physics calculation parameters from natural language prompts and formats them for function execution

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_physics_parameters
          params:
            prompt_text: ${{ prompt }}
            function_schemas: ${{ functions }}
          result: extracted_params