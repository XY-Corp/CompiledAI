workflow_id: bmi_function_call_parser
name: BMI Function Call Parser
description: Parses a natural language BMI calculation request and formats it as a function call with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_bmi_parameters_and_format_call
          params:
            text: ${{ prompt }}
            function_schema: ${{ functions }}
          result: result