workflow_id: function_call_generator
name: Function Call Generator
description: |
  Analyzes a user prompt and available functions to generate the appropriate function call with extracted parameters. Returns a function call object with the function name as key and parameters as values.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: generate_function_call
          params:
            user_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call_result
