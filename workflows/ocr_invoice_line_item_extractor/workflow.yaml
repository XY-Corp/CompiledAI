workflow_id: ocr_invoice_line_item_extractor
name: OCR Invoice Line Item Extractor
description: |
  Extracts line items from noisy OCR-scanned invoice documents using LLM-based 
  semantic understanding. Returns structured JSON array with description, quantity, 
  unit_price, and total_price fields for each line item.
variables:
  prompt: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_line_items
          params:
            ocr_text: ${{ prompt }}
          result: extraction_result