workflow_id: function_call_analyzer
name: Function Call Analyzer
description: Analyzes natural language user questions to determine the appropriate function to call and extract its parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: analyze_user_query
          params:
            user_question: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_analysis_result