workflow_id: physics_calculation_workflow
name: Physics Calculation Function Router
description: Analyzes physics problem prompts to extract calculation parameters and return function calls with correct parameter values

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_physics_parameters
          params:
            problem_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: physics_result