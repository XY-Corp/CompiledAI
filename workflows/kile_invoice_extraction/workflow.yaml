workflow_id: kile_invoice_extraction
name: KILE Invoice Document Extraction
description: |
  Extracts structured invoice information from document text including document ID,
  vendor details, customer details, invoice metadata, and financial amounts.
  Uses LLM for intelligent extraction from semi-structured OCR text.
variables:
  prompt: null
  task_type: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_fields
          params:
            document_text: ${{ prompt }}
          result: extraction_result