workflow_id: select_function_call
name: Function Call Selector
description: |
  Analyzes a user prompt to determine which function to call from a list of available functions, and extracts the appropriate parameters from the prompt to construct the function call.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: select_function_and_extract_params
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result