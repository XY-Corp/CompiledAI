workflow_id: evolution_prediction_function_call
name: Evolution Prediction Function Call Generator
description: Extracts function call parameters from natural language prompts for evolutionary rate predictions and formats them according to the prediction.evolution function signature
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_evolution_parameters
          params:
            user_prompt: ${{ prompt }}
            function_definitions: ${{ functions }}
          result: extracted_parameters