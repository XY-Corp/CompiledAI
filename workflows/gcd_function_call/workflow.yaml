workflow_id: gcd_function_call
name: GCD Function Call Generator
description: Parses a user request to find the Greatest Common Divisor (GCD) of two numbers and returns the appropriate function call structure with extracted parameters
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_gcd_request
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call