workflow_id: ocr_invoice_line_items_extraction
name: OCR Invoice Line Items Extractor
description: |
  Extracts line items from noisy OCR-scanned invoice documents using LLM-based 
  semantic understanding. Returns a JSON array of line items with description, 
  quantity, unit_price, and total_price fields.
variables:
  prompt: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_line_items
          params:
            ocr_text: ${{ prompt }}
          result: extraction_result