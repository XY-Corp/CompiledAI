workflow_id: kinematics_function_call_generator
name: Kinematics Function Call Generator
description: |
  Analyzes a natural language physics question and extracts the required parameters to generate a function call for kinematics calculations. Parses the user prompt to identify acceleration and distance values, then returns a structured function call object.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_kinematics_parameters
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: kinematics_result
