workflow_id: parse_restaurant_request
name: Parse Restaurant Request to Function Call
description: Parses a natural language restaurant search request and maps it to the appropriate function call with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call