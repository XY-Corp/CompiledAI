workflow_id: kinematics_function_selector
name: Physics Function Parameter Extractor
description: Analyzes physics problems to extract parameters and determine which kinematics function to call with the appropriate values

variables:
  prompt: null
  functions: null

root:
  activity:
    name: extract_physics_parameters
    params:
      problem_text: ${{ prompt }}
      available_functions: ${{ functions }}
    result: result