workflow_id: physics_calculation_router
name: Physics Calculation Parameter Extraction
description: Analyzes user physics questions and extracts parameters to call appropriate calculation functions

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_physics_parameters
          params:
            question_text: ${{ prompt }}
            function_schemas: ${{ functions }}
          result: physics_params