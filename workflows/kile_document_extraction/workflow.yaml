workflow_id: kile_document_extraction
name: KILE Document Information Extraction
description: |
  Extracts structured invoice/document information from OCR-scanned text including vendor details, customer details, invoice metadata, and financial amounts.
variables:
  prompt: null
  task_type: null
root:
  sequence:
    elements:
      - activity:
          name: extract_document_fields
          params:
            document_text: ${{ prompt }}
          result: extracted_data