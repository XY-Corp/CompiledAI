workflow_id: hypot_function_call_generator
name: Hypotenuse Function Call Generator
description: Parses user queries to extract parameters for the math.hypot function and generates the appropriate function call JSON

variables:
  prompt: null
  user_query: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_triangle_dimensions
          params:
            query_text: ${{ user_query }}
            available_functions: ${{ functions }}
          result: dimensions
      - activity:
          name: generate_function_call
          params:
            function_name: "math.hypot"
            parameters: ${{ dimensions }}
          result: function_call