workflow_id: classify_support_ticket
name: Support Ticket Classifier
description: Analyzes support ticket text and classifies it into one of four predefined categories - billing, technical, account, or general

variables:
  ticket_text: null

root:
  sequence:
    elements:
      - activity:
          name: classify_ticket_category
          params:
            ticket_text: ${{ ticket_text }}
            categories: ["billing", "technical", "account", "general"]
          result: classification_result