workflow_id: number_analysis_prime_factors
name: Number Analysis Prime Factorization
description: Extracts a number from a user prompt and returns a function call specification to compute its prime factors

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_number_from_prompt
          params:
            prompt: ${{ prompt }}
          result: function_call_spec