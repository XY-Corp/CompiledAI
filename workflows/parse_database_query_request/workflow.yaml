workflow_id: parse_database_query_request
name: Parse Database Query Request
description: Parse natural language database query requests and convert them into structured function calls for database operations

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_database_query_request
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: parsed_query