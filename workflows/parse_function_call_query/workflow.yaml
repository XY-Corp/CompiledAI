workflow_id: parse_function_call_query
name: Function Call Parser
description: Parses a natural language query to determine the appropriate function to call and extracts the required parameters from the query text

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_query_for_function_call
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call