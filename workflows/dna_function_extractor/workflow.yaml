workflow_id: dna_function_extractor
name: DNA Sequence Function Call Extractor
description: Extracts function call parameters from natural language DNA sequence generation requests and returns structured function call data

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_dna_function_call
          params:
            prompt_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: extracted_call