workflow_id: snp_mutation_analyzer
name: SNP Mutation Type Function Call Analyzer
description: Analyzes user requests to extract SNP ID and determine the appropriate function call for genetic mutation type analysis

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_snp_function_call
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call_result