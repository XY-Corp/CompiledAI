workflow_id: invoice_document_extraction
name: Invoice Document Field Extraction
description: |
  Extracts structured invoice data from unstructured document text,
  including vendor information, customer details, invoice identifiers,
  dates, and amounts.
variables:
  prompt: null
  task_type: null
root:
  sequence:
    elements:
      - activity:
          name: extract_invoice_fields
          params:
            document_text: ${{ prompt }}
          result: invoice_data