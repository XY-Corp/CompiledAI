workflow_id: triangle_area_function_mapper
name: Triangle Area Function Call Mapper
description: Analyzes user request for triangle area calculation, extracts base and height parameters, and structures them into the appropriate function call format

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_triangle_parameters
          params:
            user_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: triangle_params