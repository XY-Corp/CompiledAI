workflow_id: turtle_function_parser
name: Parse Turtle Data Request and Select Function
description: Analyzes user request for turtle population data and returns the appropriate function call with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_turtle_request
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call