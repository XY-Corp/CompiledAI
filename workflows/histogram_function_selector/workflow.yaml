workflow_id: histogram_function_selector
name: Create Histogram Function Selector
description: Analyzes user prompt to extract histogram parameters and returns the create_histogram function call with extracted data and bins

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_histogram_parameters
          params:
            user_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: histogram_function_call