workflow_id: ticket_classification_workflow
name: Support Ticket Classification
description: Classify support tickets into predefined categories using LLM analysis
variables:
  prompt: null
  _task_schema: null
  ticket_text: null
root:
  sequence:
    elements:
      - activity:
          name: classify_support_ticket
          params:
            ticket_text: ${{ ticket_text }}
            categories: ["billing", "technical", "account", "general"]
          result: classification_result