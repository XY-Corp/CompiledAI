workflow_id: db-query-extractor
name: Database Query Parameters Extractor
description: Extracts database query parameters from natural language requests and formats them as function calls
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_db_query_params
          params:
            user_request: ${{ prompt }}
            function_schema: ${{ functions }}
          result: extracted_params