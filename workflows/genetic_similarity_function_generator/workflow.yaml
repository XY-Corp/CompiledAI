workflow_id: genetic_similarity_function_generator
name: Genetic Similarity Function Call Generator
description: Analyzes natural language prompt about genetic similarity and generates the appropriate function call with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_and_generate_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call