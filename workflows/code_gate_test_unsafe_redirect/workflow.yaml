workflow_id: code_gate_test_unsafe_redirect
name: URL Redirector (Vulnerable)
description: Handles URL redirects without validation - CONTAINS INTENTIONAL OPEN REDIRECT VULNERABILITY

variables:
  target_url: null
  base_url: null
  path: null

activities:
  - name: create_redirect
    inputs:
      target_url: ${target_url}
    output: redirect_result

  - name: build_redirect_url
    inputs:
      base_url: ${base_url}
      path: ${path}
    output: url_result

execution_pattern: sequence
