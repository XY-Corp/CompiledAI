workflow_id: code_gate_test_subprocess_shell
name: Shell Command Runner (Vulnerable)
description: Runs shell commands with shell=True - CONTAINS INTENTIONAL COMMAND INJECTION VULNERABILITY

variables:
  command: null
  commands: null
  script_content: null

activities:
  - name: run_command_shell
    inputs:
      command: ${command}
    output: command_result

  - name: execute_pipeline
    inputs:
      commands: ${commands}
    output: pipeline_result

  - name: run_script
    inputs:
      script_content: ${script_content}
    output: script_result

execution_pattern: sequence
