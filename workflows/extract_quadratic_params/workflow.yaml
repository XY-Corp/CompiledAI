workflow_id: extract_quadratic_params
name: Extract Quadratic Equation Parameters
description: Parse a natural language prompt to extract quadratic equation coefficients and format them as a function call
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_quadratic_coefficients
          params:
            prompt_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: coefficients