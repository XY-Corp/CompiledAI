workflow_id: code_gate_test_ssrf
name: URL Fetcher (Vulnerable)
description: Fetches content from URLs - CONTAINS INTENTIONAL SSRF VULNERABILITY

variables:
  url: null
  file_url: null
  save_path: "/tmp/downloaded_file"

activities:
  - name: fetch_url
    inputs:
      url: ${url}
    output: fetch_result

  - name: download_file
    inputs:
      file_url: ${file_url}
      save_path: ${save_path}
    output: download_result

execution_pattern: sequence
