workflow_id: gcd_calculator
name: Greatest Common Divisor Calculator
description: Extracts two numbers from user input text and returns the appropriate function call structure for calculating their greatest common divisor
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_numbers_and_format_function_call
          params:
            user_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call