workflow_id: solve_quadratic_function_call
name: Generate Function Call for Quadratic Equation
description: Parses user query to extract quadratic equation coefficients and generates the appropriate function call JSON with exact parameter values

variables:
  prompt: null
  user_query: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: parse_quadratic_parameters
          params:
            user_input: ${{ user_query }}
            available_functions: ${{ functions }}
          result: function_call