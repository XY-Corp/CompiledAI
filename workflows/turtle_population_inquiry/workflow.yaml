workflow_id: turtle_population_inquiry
name: Parse and Execute Turtle Population Inquiry
description: Analyzes natural language user request to extract function call parameters and return the structured function call for turtle population data

variables:
  prompt: None
  functions: None

root:
  sequence:
    elements:
      - activity:
          name: parse_turtle_inquiry
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: turtle_inquiry_result