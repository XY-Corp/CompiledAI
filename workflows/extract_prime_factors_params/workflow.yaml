workflow_id: extract_prime_factors_params
name: Prime Factors Function Parameter Extraction
description: Analyzes natural language request to extract parameters for the get_prime_factors function call

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_function_parameters
          params:
            user_request: ${{ prompt }}
            function_definitions: ${{ functions }}
          result: extracted_params