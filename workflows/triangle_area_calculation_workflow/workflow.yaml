workflow_id: triangle_area_calculation_workflow
name: Triangle Area Calculation Workflow
description: Extracts geometric parameters from natural language text and formats them for a triangle area calculation function

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_triangle_parameters
          params:
            prompt_text: ${{ prompt }}
            function_schema: ${{ functions }}
          result: triangle_params