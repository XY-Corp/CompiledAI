workflow_id: function_call_router
name: Function Call Router
description: |
  Analyzes a natural language prompt and available function definitions to determine the appropriate function to call and extract the required parameters from the user's request.

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: route_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result