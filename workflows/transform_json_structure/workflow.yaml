workflow_id: transform_json_structure
name: JSON Structure Transformation
description: Transform JSON data from source format to target schema by mapping fields and combining values according to business logic

variables:
  source_json: null
  target_schema: null

root:
  sequence:
    elements:
      - activity:
          name: transform_json_fields
          params:
            source_data: ${{ source_json }}
            target_format: ${{ target_schema }}
          result: transformed_data