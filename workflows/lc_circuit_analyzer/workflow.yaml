workflow_id: lc_circuit_analyzer
name: LC Circuit Parameter Analyzer
description: Analyzes an LC circuit calculation request and extracts the required function parameters from natural language input
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_circuit_parameters
          params:
            circuit_text: ${{ prompt }}
            target_function: ${{ functions }}
          result: circuit_params