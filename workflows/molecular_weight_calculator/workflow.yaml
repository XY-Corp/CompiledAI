workflow_id: molecular_weight_calculator
name: Molecular Weight Calculator Function Selection
description: Analyzes a natural language query to extract function parameters for calculating molecular weight of chemical compounds

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_function_parameters
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call_result