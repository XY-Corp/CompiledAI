workflow_id: parse_and_call_function
name: Parse Request and Generate Function Call
description: Analyzes a user prompt to extract parameters and generate the appropriate function call with extracted values
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_number_and_generate_call
          params:
            user_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call_result