workflow_id: quadratic_function_parser
name: Quadratic Function Parser and Caller
description: Analyzes natural language text to extract quadratic equation parameters and returns the appropriate function call format

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call