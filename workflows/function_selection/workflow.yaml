workflow_id: function_selection
name: Function Selection from User Request
description: Analyzes a user request against available functions and returns the appropriate function to call with parameters
variables:
  functions: null
  user_request: null
root:
  sequence:
    elements:
      - activity:
          name: parse_user_intent
          params:
            user_request: ${{ user_request }}
            functions: ${{ functions }}
          result: selected_function