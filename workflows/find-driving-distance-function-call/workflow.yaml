workflow_id: find-driving-distance-function-call
name: Find Driving Distance Function Call Generator
description: Extracts location information from natural language requests and generates appropriate function calls to find driving distances between locations
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_driving_distance_request
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: result