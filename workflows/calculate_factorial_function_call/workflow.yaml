workflow_id: calculate_factorial_function_call
name: Calculate Factorial Function Call
description: Parses a user request for factorial calculation and formats it as a proper function call with parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_factorial_parameters
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: factorial_call