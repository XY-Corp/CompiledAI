workflow_id: function_selector
name: Function Selection Workflow
description: Analyzes user requests to select the appropriate function from available options and extract the required parameters

variables:
  prompt: null
  _task_schema: null
  functions: null
  user_request: null

root:
  sequence:
    elements:
      - activity:
          name: analyze_user_request
          params:
            prompt_data: ${{ prompt }}
            available_functions: ${{ functions }}
            user_request_text: ${{ user_request }}
          result: function_selection