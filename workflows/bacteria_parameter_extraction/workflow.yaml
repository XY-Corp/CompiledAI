workflow_id: bacteria_parameter_extraction
name: Bacteria Evolution Rate Parameter Extraction
description: Extracts numerical parameters from a bacteria evolution problem description and formats them for function calling
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_bacteria_parameters
          params:
            problem_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: bacteria_params