workflow_id: function_call_selector
name: Function Call Parameter Extraction
description: |
  Analyzes a natural language prompt to identify the appropriate function to call from a list of available functions and extracts the required parameters from the user's request.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: function_call_result
