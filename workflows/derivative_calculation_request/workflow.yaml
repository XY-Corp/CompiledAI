workflow_id: derivative_calculation_request
name: Derivative Calculation Function Request
description: Extracts mathematical function and x-value from natural language query and formats it as a calculate_derivative function call request
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_function_call
          params:
            query_text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call_result