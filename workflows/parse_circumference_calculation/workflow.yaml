workflow_id: parse_circumference_calculation
name: Parse Mathematical Circumference Calculation Request
description: Parses a natural language prompt to identify a circumference calculation request and extracts the function parameters (radius and unit)

variables:
  prompt: None
  functions: None

root:
  sequence:
    elements:
      - activity:
          name: parse_calculation_parameters
          params:
            text_prompt: ${{ prompt }}
            available_functions: ${{ functions }}
          result: parsed_result