workflow_id: json_field_transform
name: JSON Field Transformation
description: Transform JSON data from source format to target format by mapping fields and combining values
variables:
  source_json: null
  target_schema: null
root:
  sequence:
    elements:
      - activity:
          name: transform_json_structure
          params:
            source_data: ${{ source_json }}
            schema_definition: ${{ target_schema }}
          result: transformed_data