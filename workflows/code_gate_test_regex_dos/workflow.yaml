workflow_id: code_gate_test_regex_dos
name: Regex Validator (Vulnerable)
description: Validates input using regex - CONTAINS INTENTIONAL ReDoS VULNERABILITY

variables:
  email: null
  text: null
  pattern: null
  url: null

activities:
  - name: validate_email
    inputs:
      email: ${email}
    output: email_validation

  - name: match_pattern
    inputs:
      text: ${text}
      pattern: ${pattern}
    output: pattern_match

  - name: validate_url
    inputs:
      url: ${url}
    output: url_validation

execution_pattern: sequence
