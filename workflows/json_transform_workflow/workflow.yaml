workflow_id: json_transform_workflow
name: JSON Transformation Workflow
description: Transform JSON data from source format to target schema by parsing input data and mapping fields according to target structure

variables:
  prompt: null
  _task_schema: null
  source_json: null
  target_schema: null

root:
  sequence:
    elements:
      - activity:
          name: transform_json_data
          params:
            input_prompt: ${{ prompt }}
            source_context: ${{ _task_schema }}
            target_context: ${{ target_schema }}
          result: transformed_data