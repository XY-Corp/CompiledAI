workflow_id: json_transform_workflow
name: JSON Format Transformation
description: Transforms JSON data from source format to target schema by mapping fields and calculating derived values

variables:
  source_json: null
  target_schema: null

root:
  sequence:
    elements:
      - activity:
          name: transform_json_structure
          params:
            source_json: ${{ source_json }}
            target_schema: ${{ target_schema }}
          result: transformed_result