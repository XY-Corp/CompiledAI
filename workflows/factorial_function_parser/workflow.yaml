workflow_id: factorial_function_parser
name: Function Call Parameter Parser
description: Parse user request to extract function name and parameters for mathematical operations

variables:
  prompt: None
  functions: None

root:
  sequence:
    elements:
      - activity:
          name: parse_function_call
          params:
            user_request: ${{ prompt }}
            available_functions: ${{ functions }}
          result: parsed_call