workflow_id: travel_time_route_planner
name: Travel Time Route Planner
description: Parse natural language travel requests and extract route information to format function calls for travel time estimation

variables:
  prompt: None
  functions: None

root:
  activity:
    name: parse_travel_request
    params:
      request_text: ${{ prompt }}
      available_functions: ${{ functions }}
    result: parsed_route