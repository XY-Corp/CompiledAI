workflow_id: normalize_address_workflow
name: Address Normalization Workflow
description: Normalizes address data from raw prompt input into standardized format with street, city, state, zip, and country fields
variables:
  prompt: null
  _task_schema: null
  address: null
root:
  sequence:
    elements:
      - activity:
          name: normalize_address_data
          params:
            address_text: ${{ address }}
          result: normalized_address