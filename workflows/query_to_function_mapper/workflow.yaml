workflow_id: query_to_function_mapper
name: User Query to Function Parameters Mapper
description: Analyzes a user's natural language query and maps it to the appropriate function call with extracted parameters

variables:
  prompt: None
  functions: None

root:
  sequence:
    elements:
      - activity:
          name: extract_function_parameters
          params:
            user_query: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call