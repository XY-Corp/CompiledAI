workflow_id: physics_function_call_workflow
name: Physics Function Call Workflow
description: Parses physics problem text to extract parameters and calls the appropriate calculation function
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: parse_physics_problem
          params:
            problem_text: ${{ prompt }}
            target_function: calculate_final_velocity
          result: function_call_result