workflow_id: heat_capacity_parameter_extraction
name: Heat Capacity Parameter Extraction
description: Extracts function parameters from natural language request about calculating heat capacity and formats them for function execution

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: extract_heat_capacity_params
          params:
            text: ${{ prompt }}
            available_functions: ${{ functions }}
          result: extraction_result