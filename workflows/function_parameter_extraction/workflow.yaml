workflow_id: function_parameter_extraction
name: Function Parameter Extraction Workflow
description: |
  Analyzes a natural language prompt to extract parameter values for a specified function and returns the function call metadata in a structured format with the function name as the top-level key.
variables:
  prompt: null
  functions: null
root:
  sequence:
    elements:
      - activity:
          name: extract_function_parameters
          params:
            prompt: ${{ prompt }}
            functions: ${{ functions }}
          result: extraction_result
