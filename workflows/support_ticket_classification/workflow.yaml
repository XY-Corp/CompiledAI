workflow_id: support_ticket_classification
name: Support Ticket Classification
description: "Classify a support ticket into one of four predefined categories: billing, technical, account, or general based on the ticket content"
variables:
  ticket_text: null
root:
  sequence:
    elements:
      - activity:
          name: classify_support_ticket
          params:
            ticket_text: ${{ ticket_text }}
            categories: ["billing", "technical", "account", "general"]
          result: classification