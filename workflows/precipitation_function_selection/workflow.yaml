workflow_id: precipitation_function_selection
name: Amazon Precipitation Function Selection
description: Analyzes natural language query to select appropriate ecology precipitation function with extracted parameters

variables:
  prompt: null
  functions: null

root:
  sequence:
    elements:
      - activity:
          name: analyze_precipitation_request
          params:
            user_query: ${{ prompt }}
            available_functions: ${{ functions }}
          result: function_call_result